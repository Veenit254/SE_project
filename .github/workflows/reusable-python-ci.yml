name: Reusable Python CI

on:
  workflow_call:
    inputs:
      run_backtests:
        required: false
        type: boolean
        default: false

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend   # ✅ IMPORTANT

    steps:
      # -----------------------------
      # CHECKOUT
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # PYTHON SETUP
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # -----------------------------
      # CACHE DEPENDENCIES
      # -----------------------------
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}

      # -----------------------------
      # INSTALL DEPENDENCIES
      # -----------------------------
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # -----------------------------
      # LINT (SAFE VERSION)
      # -----------------------------
      - name: Install lint tools
        run: pip install ruff pylint

      - name: Run lint
        run: |
          ruff check .
          pylint app || true   # don't fail hard yet

      # -----------------------------
      # TYPE CHECK (OPTIONAL)
      # -----------------------------
      - name: Install mypy
        run: pip install mypy

      - name: Run type check
        run: |
          mypy app || true

      # -----------------------------
      # TESTS (SAFE)
      # -----------------------------
      - name: Install pytest
        run: pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest || echo "No tests found"

      # -----------------------------
      # BASIC IMPORT CHECK (CRITICAL)
      # -----------------------------
      - name: Validate app startup
        run: |
          python -c "import app"
